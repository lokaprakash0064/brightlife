<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{PageTitle}</title>
        <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
        <meta name="keywords" content="{KeyWords}">
        <meta name="description" content="{Descript}">
        <meta name="author" content="Lokaprakash Behera <lokaprakash.behera@gmail.com>">
        <meta name="robots" content="noindex, nofollow">
        <link rel="apple-touch-icon" sizes="57x57" href="{FaviconPath}apple-icon-57x57.png">
        <link rel="apple-touch-icon" sizes="60x60" href="{FaviconPath}apple-icon-60x60.png">
        <link rel="apple-touch-icon" sizes="72x72" href="{FaviconPath}apple-icon-72x72.png">
        <link rel="apple-touch-icon" sizes="76x76" href="{FaviconPath}apple-icon-76x76.png">
        <link rel="apple-touch-icon" sizes="114x114" href="{FaviconPath}apple-icon-114x114.png">
        <link rel="apple-touch-icon" sizes="120x120" href="{FaviconPath}apple-icon-120x120.png">
        <link rel="apple-touch-icon" sizes="144x144" href="{FaviconPath}apple-icon-144x144.png">
        <link rel="apple-touch-icon" sizes="152x152" href="{FaviconPath}apple-icon-152x152.png">
        <link rel="apple-touch-icon" sizes="180x180" href="{FaviconPath}apple-icon-180x180.png">
        <link rel="icon" type="image/png" sizes="192x192" href="{FaviconPath}android-icon-192x192.png">
        <link rel="icon" type="image/png" sizes="32x32" href="{FaviconPath}favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="96x96" href="{FaviconPath}favicon-96x96.png">
        <link rel="icon" type="image/png" sizes="16x16" href="{FaviconPath}favicon-16x16.png">
        <link rel="manifest" href="{FaviconPath}manifest.json">
        <meta name="msapplication-TileColor" content="#ffffff">
        <meta name="msapplication-TileImage" content="{FaviconPath}ms-icon-144x144.png">
        <meta name="theme-color" content="#ffffff">
        <script>
            addEventListener("load", function () {
                setTimeout(hideURLbar, 0);
            }, false);

            function hideURLbar() {
                window.scrollTo(0, 1);
            }
        </script>
        <!-- Fonts: Poppins (v2 design system) -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <!-- Bootstrap 4 -->
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
        <!-- Font Awesome 6 (backward-compatible with FA5 icon names used throughout) -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
        <!-- Brightlife v2 design system -->
        <link rel="stylesheet" href="{AbsUrl}helpers/css/brightlife-v2.css" type="text/css">
        <!-- Page-specific CSS injected by assignTemplate() -->
        {CSSHelpers}
        <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
        <!--[if lt IE 9]>
          <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
          <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
        <![endif]-->
    </head>
    <body class="admin-banner">
        <div class="container">
                <h2 class="text-primary heading text-uppercase my-3 text-center">Admin Panel - Brightlife Matrimony</h2>
            <div class="col-md-4 offset-md-4">
                <div class="card bg-dark-grad box-shadow mt-5">
                    <div class="card-body">
                        <div class="text-center">
                            <img src="{ImgPath}logo.png" class="img-logo" alt=" ">    
                        </div>                        
                        <form method="post" action="{AbsUrl}login-action/" class="py-3">
                            <div class="form-row">
                                <div class="col-md-10 offset-md-1 my-2">
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text" id="nameprepend"><i class="fas fa-user-circle"></i></span>
                                        </div>
                                        <input type="text" class="form-control" id="uname" name="uname" placeholder="Username" required="required">
                                    </div>
                                </div>
                                <div class="col-md-10 offset-md-1 my-2">
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text" id="passprepend"><i class="fas fa-lock"></i></span>
                                        </div>
                                        <input type="password" class="form-control" id="pass" name="pass" placeholder="Password" required="required">
                                    </div>
                                </div>
                            </div>
                            <div class="text-center my-2">
                                <button class="btn btn-info"><i class="fas fa-sign-in-alt"></i> Sign In</button>
                            </div>
                        </form>
                    </div>                    
                </div>
            </div>
        </div>
        <!-- Error Modal -->
        <div class="modal fade" tabindex="-1" role="dialog" data-toggle="modal" aria-labelledby="errModal" id="errModal">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content bg-theme1">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    </div>
                    <div class="modal-body">
                        {ErrMsgs}
                    </div>
                </div><!-- /.modal-content -->
            </div><!-- /.modal-dialog -->
        </div>
        <script src="https://code.jquery.com/jquery-2.2.4.min.js" integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-backstretch/2.0.4/jquery.backstretch.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
        <!-- Brightlife v2 nav — no navbar on this page; script is fully dormant here -->
        <script src="{AbsUrl}helpers/js/brightlife-nav.js"></script>
        <script type="text/javascript">
            $(document).ready(function () {
                var stsStr = '{ErrMsgs}';
                if (stsStr.length > 0) {
                    $('#errModal').modal('show');
                }
            });
            function btnFun() {
                $('#querySubmit').button('loading');
            }
        </script>
    </body>
</html>
