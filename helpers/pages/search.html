<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="bl-form-panel" data-aos="fade-up">
                    <div class="bl-form-panel-header">
                        <h4 class="bl-form-panel-title">Search by Profile</h4>
                    </div>
                    <div class="bl-form-panel-body">
                        <form class="bl-auth-form" method="post" action="{AbsUrl}search-profile/">
                            <div class="bl-form-grid">
                                <div class="form-group">
                                    <label for="gender">I&#039;m Looking For a</label>
                                    <select class="form-control" name="gender" id="gender">
                                        <option value="1">Female</option>
                                        <option value="2">Male</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="age">Aged Between</label>
                                    <select class="form-control" name="age" id="age">
                                        <option value="1">18-25</option>
                                        <option value="2">25-30</option>
                                        <option value="3">30-35</option>
                                        <option value="4">35-40</option>
                                        <option value="5">All</option>
                                        <option value="6">40+</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="caste">Caste</label>
                                    <select class="form-control" name="caste" id="caste">
                                        {Caste}
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="rel">Religion</label>
                                    <select class="form-control" name="rel" id="rel">
                                        {religion}
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="state">State</label>
                                    <select class="form-control" name="state" id="state">
                                        {State}
                                    </select>
                                </div>
                            </div>
                            <hr class="bl-form-divider">
                            <div class="bl-form-submit">
                                <button type="submit" class="btn btn-bl-primary">
                                    <i class="fas fa-flag-checkered mr-2"></i>Search
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
