<div class="container pt-3 pb-3">
    <div class="col-md-6 offset-md-3">
        <div class="card bg-dark-grad box-shadow card-sm">
            <div class="card-body">
                <h4 class="text-info text-center text-uppercase heading">Search by Profile</h4>
                <form method="post" action="{AbsUrl}search-profile/" class="text-light">
                    <div class="form-group">
                        <label for="gender" class="col-12 mt-3">I&#039;m Looking For a</label>
                        <div class="col-12">
                            <select class="form-control" name="gender" id="gender">
                                <option value="1">Female</option>
                                <option value="2">Male</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="age" class="col-12 mt-3">Aged Between</label>
                        <div class="col-12">
                            <select class="form-control" name="age" id="age">
                                <option value="1">18-25</option>
                                <option value="2">25-30</option>
                                <option value="3">30-35</option>
                                <option value="4">35-40</option>
                                <option value="5">All</option>
                                <option value="6">40+</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="caste" class="col-12 mt-3">Caste</label>
                        <div class="col-12">
                            <select class="form-control" name="caste" id="caste">
                                {Caste}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="rel" class="col-12 mt-3">Religion</label>
                        <div class="col-12">
                            <select class="form-control" name="rel" id="rel">
                                {religion}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="state" class="col-12 mt-3">State</label>
                        <div class="col-12">
                            <select class="form-control" name="state" id="state">
                                {State}
                            </select>
                        </div>
                    </div>
                    <div class="text-center pb-2">
                        <button type="submit" class="btn btn-outline-info">
                            <i class="fas fa-flag-checkered"></i> Search
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
