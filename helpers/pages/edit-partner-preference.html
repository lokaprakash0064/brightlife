<div class="inner-banner"></div>
<div class="container pb-2">
    <h3 class="text-center text-primary text-uppercase heading mt-3">Edit Partner Preference</h3>
    <div class="col-md-8 offset-md-2">
        <div class="card bg-dark-grad box-shadow">
            <div class="card-body">
                <form class="text-light" method="post" action="{AbsUrl}save-edit-partner-preference/{custId}/">
                    {marStat}
                    <div class="form-group">
                        <label for="religion" class="col-12 text-info">Religion</label>
                        <div class="col-12">
                            <select class="form-control" name="religion" id="religion">
                                {religion}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="caste" class="col-12 text-info">Caste</label>
                        <div class="col-12">
                            <select class="form-control" name="caste" id="caste">
                                {caste}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="residingState" class="col-12 text-info">Residing State</label>
                        <div class="col-12">
                            <select class="form-control" name="residingState" id="residingState">
                                {state}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="residingCity" class="col-12 text-info">Residing City</label>
                        <div class="col-12">
                            <input type="text" class="form-control" name="residingCity" id="residingCity" value="{resCity}" required="required">
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="form-row">
                            <label for="ageFrom" class="col-3 text-info">Age From</label>
                            <div class="col-3">
                                <input type="number" class="form-control" name="ageFrom" id="ageFrom" value="{ageFrom}" required="required">
                            </div>
                            <label for="ageTo" class="col-3 text-info">To</label>
                            <div class="col-3">
                                <input type="number" class="form-control" name="ageTo" id="ageTo" value="{ageTo}" required="required">
                            </div>
                        </div>
                    </div>
                    <h3 class="text-center text-primary text-uppercase heading mt-2 mb-2">Education &amp; Occupation</h3>
                    <div class="form-group">
                        <label for="education" class="col-12 text-info">Education</label>
                        <div class="col-12">
                            <select class="form-control" name="education" id="education" required="required">
                                {Education}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="occupation" class="col-12 text-info">Occupation</label>
                        <div class="col-12">
                            <select class="form-control" name="occupation" id="occupation" required="required">
                                {Occupation}
                            </select>
                        </div>
                    </div>
                    {employedIn}
                    <div class="form-group">
                        <label for="income" class="col-12 text-info">Annual Income</label>
                        <div class="col-12">
                            <select class="form-control" name="income" id="income" required="required">
                                {income}
                            </select>
                        </div>
                    </div>
                    <h3 class="text-center text-primary text-uppercase heading mt-2 mb-2">Family Profile</h3>
                    {famStat}
                    {famType}
                    {famValues}
                    <div class="form-group">
                        <label for="partnerDesc" class="col-12 text-info">Describe about your partner</label>
                        <div class="col-12">
                            <textarea class="form-control" name="partnerDesc" id="partnerDesc" required="required">{patDesc}</textarea>
                            <cite class="help-block text-danger">Describe about your Partner within 300 characters</cite>
                        </div>
                    </div>
                    <div class="text-center">
                        <button class="btn btn-danger" type="submit" name="submitPartPref" id="submitPartPref">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
