<section class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="bl-form-panel bl-auth-form" data-aos="fade-up">
                    <div class="bl-form-panel-header">
                        <i class="fas fa-heart"></i>
                        <h4 class="bl-form-panel-title">Edit Partner Preference</h4>
                    </div>
                    <div class="bl-form-panel-body">
                        <form method="post" action="{AbsUrl}save-edit-partner-preference/{custId}/">
                            <input type="hidden" name="csrf_token" value="{CsrfToken}">
                            {marStat}
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="religion">Religion</label>
                                        <select class="form-control" name="religion" id="religion">
                                            {religion}
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="caste">Caste</label>
                                        <select class="form-control" name="caste" id="caste">
                                            {caste}
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="residingState">Residing State</label>
                                        <select class="form-control" name="residingState" id="residingState">
                                            {state}
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="residingCity">Residing City</label>
                                        <input type="text" class="form-control" name="residingCity" id="residingCity" value="{resCity}" required="required">
                                    </div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="ageFrom">Age From</label>
                                        <input type="number" class="form-control" name="ageFrom" id="ageFrom" value="{ageFrom}" required="required">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="ageTo">Age To</label>
                                        <input type="number" class="form-control" name="ageTo" id="ageTo" value="{ageTo}" required="required">
                                    </div>
                                </div>
                            </div>
                            <h5 class="bl-form-section-title">Education &amp; Occupation</h5>
                            <div class="form-group">
                                <label for="education">Education</label>
                                <select class="form-control" name="education" id="education" required="required">
                                    {Education}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="occupation">Occupation</label>
                                <select class="form-control" name="occupation" id="occupation" required="required">
                                    {Occupation}
                                </select>
                            </div>
                            {employedIn}
                            <div class="form-group">
                                <label for="income">Annual Income</label>
                                <select class="form-control" name="income" id="income" required="required">
                                    {income}
                                </select>
                            </div>
                            <h5 class="bl-form-section-title">Family Profile</h5>
                            {famStat}
                            {famType}
                            {famValues}
                            <div class="form-group">
                                <label for="partnerDesc">Describe about your partner</label>
                                <textarea class="form-control" name="partnerDesc" id="partnerDesc" rows="4" required="required">{patDesc}</textarea>
                                <small class="form-text bl-form-note">Describe about your Partner within 300 characters</small>
                            </div>
                            <div class="bl-form-actions">
                                <button class="btn btn-bl-primary" name="submitPartPref" id="submitPartPref" type="submit">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
