<section class="bl-error-state">
    <div class="container text-center">
        <div class="bl-error-icon" data-aos="fade-down">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <div class="bl-error-code" data-aos="fade-up">404</div>
        <h1 class="bl-error-title" data-aos="fade-up">Page Not Found</h1>
        <p class="bl-error-message" data-aos="fade-up">It seems you just tried to view a page which does not exist.</p>
        <a href="{AbsUrl}" class="btn btn-bl-primary" data-aos="fade-up">
            <i class="fas fa-home mr-2"></i>Back to Home
        </a>
    </div>
</section>
