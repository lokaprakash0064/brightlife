<div class="ba-admin-layout">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card ba-form-card">
                <div class="card-body">
                    <h4 class="ba-form-section">Edit Partner Preference</h4>
                    <form method="post" action="{AbsUrl}save-part-pref-admin/{cId}/">
                        <div class="form-group">
                            {marStat}
                        </div>
                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="religion">Religion</label>
                                    <select class="form-control" name="religion" id="religion">
                                        {religion}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="caste">Caste</label>
                                    <select class="form-control" name="caste" id="caste">
                                        {Caste}
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="resdingState">Residing State</label>
                                    <select class="form-control" name="resdingState" id="resdingState">
                                        {state}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="residingCity">Residing City</label>
                                    <input type="text" class="form-control" name="residingCity" id="residingCity" required="required" value="{residingCity}">
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="ageFrom">Age From</label>
                                    <input type="number" class="form-control" name="ageFrom" id="ageFrom" required="required" value="{ageFrm}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="ageTo">Age To</label>
                                    <input type="number" class="form-control" name="ageTo" id="ageTo" required="required" value="{ageTo}">
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="education">Education</label>
                                    <select class="form-control" name="education" id="education">
                                        {education}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="occupation">Occupation</label>
                                    <select class="form-control" name="occupation" id="occupation">
                                        {occupation}
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            {empIn}
                        </div>
                        <div class="form-group">
                            <label for="income">Annual Income</label>
                            <select class="form-control" name="income" id="income">
                                {income}
                            </select>
                        </div>
                        <div class="form-group">
                            {famStat}
                        </div>
                        <div class="form-group">
                            {famType}
                        </div>
                        <div class="form-group">
                            {famVal}
                        </div>
                        <div class="form-group">
                            <label for="desc">Partner Description</label>
                            <textarea class="form-control" name="desc" id="desc" required="required">{desc}</textarea>
                        </div>
                        <div class="text-center mt-3">
                            <button class="btn btn-danger" type="submit">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
