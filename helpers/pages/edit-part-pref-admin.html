<div class="col-md-8 offset-md-2">
    <div class="card my-4">
        <div class="card-body">
            <h4 class="text-center text-danger heading">Edit Partner Preference</h4>
            <form method="post" action="{AbsUrl}save-part-pref-admin/{cId}/">
                {marStat}
                <div class="form-group">
                    <label for="religion" class="text-info col-12">Religion</label>
                    <div class="col-12">
                        <select class="form-control" name="religion" id="religion">
                            {religion}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="caste" class="text-info col-12">Caste</label>
                    <div class="col-12">
                        <select class="form-control" name="caste" id="caste">
                            {Caste}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="resdingState" class="text-info col-12">Residing State</label>
                    <div class="col-12">
                        <select class="form-control" name="resdingState" id="resdingState">
                            {state}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="residingCity" class="text-info col-12">Residing City</label>
                    <div class="col-12">
                        <input type="text" class="form-control" name="residingCity" id="residingCity" required="required" value="{residingCity}">
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-row">
                        <label for="ageFrom" class="col-3 text-info">Age From</label>
                        <div class="col-3">
                            <input type="number" class="form-control" name="ageFrom" id="ageFrom" required="required" value="{ageFrm}">
                        </div>
                        <label for="ageTo" class="col-3 text-info">To</label>
                        <div class="col-3">
                            <input type="number" class="form-control" name="ageTo" id="ageTo" required="required" value="{ageTo}">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="education" class="text-info col-12">Education</label>
                    <div class="col-12">
                        <select class="form-control" name="education" id="education">
                            {education}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="occupation" class="text-info col-12">Occupation</label>
                    <div class="col-12">
                        <select class="form-control" name="occupation" id="occupation">
                            {occupation}
                        </select>
                    </div>
                </div>
                {empIn}
                <div class="form-group">
                    <label for="income" class="text-info col-12">Annual income</label>
                    <div class="col-12">
                        <select class="form-control" name="income" id="income">
                            {income}
                        </select>
                    </div>
                </div>
                {famStat}
                {famType}
                {famVal}
                <div class="form-group">
                    <label for="desc" class="text-info col-12">Partner Description</label>
                    <div class="col-12">
                        <textarea class="form-control" name="desc" id="desc" required="required">{desc}</textarea>
                    </div>
                </div>                
                <div class="text-center">
                    <button class="btn btn-danger" type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
