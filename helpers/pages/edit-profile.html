<section class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="bl-form-panel bl-auth-form" data-aos="fade-up">
                    <div class="bl-form-panel-header">
                        <i class="fas fa-user-edit"></i>
                        <h4 class="bl-form-panel-title">Personal Details</h4>
                    </div>
                    <div class="bl-form-panel-body">
                        <form method="post" action="{AbsUrl}save-edited-personal-detail/{custId}/" enctype="multipart/form-data">
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="residingState">State</label>
                                        <select class="form-control" name="residingState" id="residingState">
                                            {State}
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="residingCity">Residing City</label>
                                        <input type="text" class="form-control" name="residingCity" id="residingCity" value="{resCity}" required="required">
                                    </div>
                                </div>
                            </div>
                            <h5 class="bl-form-section-title">Physical Attributes</h5>
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="height">Height</label>
                                        <input type="text" class="form-control" name="height" id="height" value="{height}" required="required">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="weight">Weight (In KG)</label>
                                        <input type="text" class="form-control" name="weight" id="weight" value="{weight}" required="required">
                                    </div>
                                </div>
                            </div>
                            {bodyType}
                            {complexion}
                            {physicalStat}
                            <h5 class="bl-form-section-title">Education &amp; Occupation</h5>
                            <div class="form-group">
                                <label for="education">Education</label>
                                <select class="form-control" name="education" id="education">
                                    {Education}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="eduDetails">Details</label>
                                <textarea class="form-control" name="eduDetails" id="eduDetails" rows="3" required="required">{educationDetails}</textarea>
                            </div>
                            <div class="form-group">
                                <label for="occupation">Occupation</label>
                                <select class="form-control" name="occupation" id="occupation">
                                    {Occupation}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="occDetails">Details</label>
                                <textarea class="form-control" name="occDetails" id="occDetails" rows="3" required="required">{occupationDetails}</textarea>
                            </div>
                            {employedIn}
                            <div class="form-group">
                                <label for="income">Annual Income</label>
                                <select class="form-control" name="income" id="income">
                                    {income}
                                </select>
                            </div>
                            <h5 class="bl-form-section-title">Habits</h5>
                            {food}
                            {smoking}
                            {drinking}
                            <h5 class="bl-form-section-title">Family Profile</h5>
                            {familyStat}
                            {familyType}
                            {familyValues}
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="occFather">Father&#39;s Occupation</label>
                                        <input type="text" class="form-control" name="occFather" id="occFather" value="{fatherOcc}" required="required">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="occMother">Mother&#39;s Occupation</label>
                                        <input type="text" class="form-control" name="occMother" id="occMother" value="{motherOcc}" required="required">
                                    </div>
                                </div>
                            </div>
                            <h5 class="bl-form-section-title">Descriptions</h5>
                            <div class="form-group">
                                <label for="desc">Describe Yourself</label>
                                <textarea class="form-control" name="desc" id="desc" rows="4" required="required">{desc}</textarea>
                                <small class="form-text bl-form-note">Describe within 300 characters</small>
                            </div>
                            <div class="bl-form-actions">
                                <button class="btn btn-bl-primary" name="submitPerDet" id="submitPerDet" type="submit">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
