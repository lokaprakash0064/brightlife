<section class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="bl-form-panel bl-auth-form" data-aos="fade-up">
                    <div class="bl-form-panel-header">
                        <i class="fas fa-user"></i>
                        <h4 class="bl-form-panel-title">Personal Detail</h4>
                    </div>
                    <div class="bl-form-panel-body">
                        <form method="post" action="{AbsUrl}save-personal-detail/{custId}/" name="savePerDetForm" enctype="multipart/form-data" id="savePerDetForm" role="form">
                            <input type="hidden" name="csrf_token" value="{CsrfToken}">
                            <div class="form-group">
                                <label>Profile Created for</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="profCreated" id="self" value="1" checked="checked" class="form-check-input">
                                    <label class="form-check-label" for="self">Self</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="profCreated" id="son" value="2" class="form-check-input">
                                    <label class="form-check-label" for="son">Son</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="profCreated" id="daughter" value="3" class="form-check-input">
                                    <label class="form-check-label" for="daughter">Daughter</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="profCreated" id="brother" value="4" class="form-check-input">
                                    <label class="form-check-label" for="brother">Brother</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="profCreated" id="relative" value="5" class="form-check-input">
                                    <label class="form-check-label" for="relative">Relative</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="profCreated" id="sister" value="6" class="form-check-input">
                                    <label class="form-check-label" for="sister">Sister</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="profCreated" id="friend" value="7" class="form-check-input">
                                    <label class="form-check-label" for="friend">Friend</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Marital Status</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="maritalStatus" id="unmarried" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="unmarried">Unmarried</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="maritalStatus" id="widower" value="2" class="form-check-input">
                                    <label class="form-check-label" for="widower">Widower</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="maritalStatus" id="divorced" value="3" class="form-check-input">
                                    <label class="form-check-label" for="divorced">Divorced</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="maritalStatus" id="awtDivorce" value="4" class="form-check-input">
                                    <label class="form-check-label" for="awtDivorce">Awaiting Divorce</label>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="rashi">Rashi</label>
                                        <select class="form-control" name="rashi" id="rashi">
                                            {rashi}
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="star">Star</label>
                                        <select class="form-control" name="star" id="star">
                                            {star}
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="gothra">Gothra</label>
                                <input type="text" class="form-control" name="gothra" id="gothra" placeholder="Your Gothra">
                            </div>
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="residingState">Residing State</label>
                                        <select class="form-control" name="residingState" id="residingState">
                                            {state}
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="residingCity">Residing City</label>
                                        <input type="text" class="form-control" name="residingCity" id="residingCity" placeholder="Residing City">
                                    </div>
                                </div>
                            </div>
                            <h5 class="bl-form-section-title">Physical Attributes</h5>
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="height">Height</label>
                                        <input type="text" class="form-control" name="height" id="height" placeholder="Your Height">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="weight">Weight(Kilogram)</label>
                                        <input type="text" class="form-control" name="weight" id="weight" placeholder="Your Weight">
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Body Type</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="bodyType" id="average" value="1" checked="checked" class="form-check-input">
                                    <label class="form-check-label" for="average">Average</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="bodyType" id="athletic" value="2" class="form-check-input">
                                    <label class="form-check-label" for="athletic">Athletic</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="bodyType" id="slim" value="3" class="form-check-input">
                                    <label class="form-check-label" for="slim">Slim</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="bodyType" id="heavy" value="4" class="form-check-input">
                                    <label class="form-check-label" for="heavy">Heavy</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Complexion</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="complexion" id="vryFair" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="vryFair">Very Fair</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="complexion" id="fair" value="2" class="form-check-input">
                                    <label class="form-check-label" for="fair">Fair</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="complexion" id="wheatish" value="3" class="form-check-input">
                                    <label class="form-check-label" for="wheatish">Wheatish</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="complexion" id="wheatishBrown" value="4" class="form-check-input">
                                    <label class="form-check-label" for="wheatishBrown">Wheatish Brown</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="complexion" id="dark" value="5" class="form-check-input">
                                    <label class="form-check-label" for="dark">Dark</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Physical Status</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="phyisicalStatus" id="normal" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="normal">Normal</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="phyisicalStatus" id="phyChallenged" value="2" class="form-check-input">
                                    <label class="form-check-label" for="phyChallenged">Physically Challenged</label>
                                </div>
                            </div>
                            <h5 class="bl-form-section-title">Education and Occupation</h5>
                            <div class="form-group">
                                <label for="education">Education</label>
                                <select class="form-control" name="education" id="education">
                                    {education}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="eduDetails">Education Details</label>
                                <textarea class="form-control" name="eduDetails" id="eduDetails" rows="3" placeholder="Education Details" required="required"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="occupation">occupation</label>
                                <select class="form-control" name="occupation" id="occupation">
                                    {occupation}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="occDetails">Occupation Details</label>
                                <textarea class="form-control" name="occDetails" id="occDetails" rows="3" placeholder="Occupation Details" required="required"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Employed In</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="employedIn" id="government" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="government">Government</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="employedIn" id="private" value="2" class="form-check-input">
                                    <label class="form-check-label" for="private">Private</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="employedIn" id="business" value="3" class="form-check-input">
                                    <label class="form-check-label" for="business">Business</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="employedIn" id="Defence" value="4" class="form-check-input">
                                    <label class="form-check-label" for="Defence">Defence</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="employedIn" id="SelfEmployed" value="5" class="form-check-input">
                                    <label class="form-check-label" for="SelfEmployed">Self Employed</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="employedIn" id="notWorking" value="6" class="form-check-input">
                                    <label class="form-check-label" for="notWorking">Not Working</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="income">Income</label>
                                <select class="form-control" name="income" id="income">
                                    {income}
                                </select>
                            </div>
                            <h5 class="bl-form-section-title">Habits</h5>
                            <div class="form-group">
                                <label>Food</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="food" id="vegetarian" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="vegetarian">Vegetarian</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="food" id="nonVegitarian" value="2" class="form-check-input">
                                    <label class="form-check-label" for="nonVegitarian">Non Vegitarian</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="food" id="eggetarian" value="3" class="form-check-input">
                                    <label class="form-check-label" for="eggetarian">Eggetarian</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Smoking</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="smoking" id="no" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="no">No</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="smoking" id="occasionally" value="2" class="form-check-input">
                                    <label class="form-check-label" for="occasionally">Occasionally</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="smoking" id="yes" value="3" class="form-check-input">
                                    <label class="form-check-label" for="yes">Yes</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Drinking</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="drinking" id="noDrnk" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="noDrnk">No</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="drinking" id="occasionallyDrnk" value="2" class="form-check-input">
                                    <label class="form-check-label" for="occasionallyDrnk">Occasionally</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="drinking" id="yesDrnk" value="3" class="form-check-input">
                                    <label class="form-check-label" for="yesDrnk">Yes</label>
                                </div>
                            </div>
                            <h5 class="bl-form-section-title">Family Profile</h5>
                            <div class="form-group">
                                <label>Family Status</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyStatus" id="middleClass" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="middleClass">Middle Class</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyStatus" id="upMiddleClass" value="2" class="form-check-input">
                                    <label class="form-check-label" for="upMiddleClass">Upper Middle Class</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyStatus" id="rich" value="3" class="form-check-input">
                                    <label class="form-check-label" for="rich">Rich</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyStatus" id="affluent" value="4" class="form-check-input">
                                    <label class="form-check-label" for="affluent">Affluent</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Family Type</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyType" id="joint" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="joint">Joint</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyType" id="Nuclear" value="2" class="form-check-input">
                                    <label class="form-check-label" for="Nuclear">Nuclear</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Family Values</label>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyValues" id="orthodox" value="1" class="form-check-input" checked="checked">
                                    <label class="form-check-label" for="orthodox">Orthodox</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyValues" id="traditional" value="2" class="form-check-input">
                                    <label class="form-check-label" for="traditional">Traditional</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyValues" id="moderate" value="3" class="form-check-input">
                                    <label class="form-check-label" for="moderate">Moderate</label>
                                </div>
                                <div class="form-check form-check-inline ml-3">
                                    <input type="radio" name="familyValues" id="liberal" value="4" class="form-check-input">
                                    <label class="form-check-label" for="liberal">Liberal</label>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="occFather">Father&#039;s Occupation</label>
                                        <input type="text" class="form-control" name="occFather" id="occFather" required="required" placeholder="Occupation of your Father">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="occMother">Mother&#039;s Occupation</label>
                                        <input type="text" class="form-control" name="occMother" id="occMother" required="required" placeholder="Occupation of your Mother">
                                    </div>
                                </div>
                            </div>
                            <h5 class="bl-form-section-title">Descriptions</h5>
                            <div class="form-group">
                                <label for="desc">Description</label>
                                <textarea class="form-control" name="desc" id="desc" rows="4" required="required" placeholder="Describe About Yourself"></textarea>
                                <small class="form-text bl-form-note">Describe within 300 characters</small>
                            </div>
                            <div class="form-group">
                                <label for="uploadPhoto">Upload Image</label>
                                <input type="file" class="form-control-file" name="uploadPhoto" id="uploadPhoto" required="required">
                                <small class="form-text bl-form-note">Image Size must be less than 10 MB</small>
                            </div>
                            <div class="bl-form-actions">
                                <button class="btn btn-bl-primary" name="submitPerDet" id="submitPerDet" type="submit">Save</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
