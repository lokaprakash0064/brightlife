<div class="ba-admin-layout">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card ba-form-card">
                <div class="card-body">
                    <h4 class="ba-form-section">Signup Data of {Name}</h4>
                    <form method="post" action="{AbsUrl}save-signup-admin/{cId}/">
                            <input type="hidden" name="csrf_token" value="{CsrfToken}">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" name="name" id="name" class="form-control" value="{Name}" required="required">
                        </div>
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="text" name="dob" id="dob" class="form-control" value="{DOB}" required="required" placeholder="DD-MM-YYYY">
                        </div>
                        <div class="form-group">
                            {Gender}
                        </div>
                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="rel">Religion</label>
                                    <select class="form-control" name="rel" id="rel">
                                        {religion}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="caste">Caste</label>
                                    <select class="form-control" name="caste" id="caste">
                                        {caste}
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="mob">Mobile Number</label>
                                    <input type="text" name="mob" id="mob" class="form-control" value="{mobNo}" required="required">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="mail">E-mail</label>
                                    <input type="email" name="mail" id="mail" class="form-control" value="{email}" required="required">
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="pass">New Password</label>
                                    <input type="password" name="pass" id="pass" class="form-control" placeholder="Type New Password" required="required">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="rpass">Retype Password</label>
                                    <input type="password" name="rpass" id="rpass" class="form-control" placeholder="Retype Password" required="required">
                                </div>
                            </div>
                        </div>
                        <div class="text-center mt-3">
                            <button class="btn btn-danger" type="submit">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
