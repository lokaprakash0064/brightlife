<div class="container pt-3 pb-3">
        <div class="col-md-6 offset-md-3">
            <div class="card bg-dark-grad box-shadow card-sm">
                <div class="card-body">
                    <h4 class="text-info text-center text-uppercase heading">Search by ID</h4>
                    <form class="text-light" method="post" action="{AbsUrl}profile/">
                        <div class="form-group">
                            <div class="col-12">
                                <input type="text" name="blId" id="blId" class="form-control" placeholder="Enter Brightlife ID" required="required">
                            </div>
                            <div class="text-center mt-3">
                                <button class="btn btn-danger" type="submit">Search</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
